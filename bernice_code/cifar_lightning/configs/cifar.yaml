project:
  seed: 42
  name: cifar-classification

data:
  dataset: cifar10
  data_dir: ../data
  batch_size: 128
  num_workers: 4
  val_split: 5000
  random_erasing_p: 0.25
  random_rotation: 10

model:
  name: resnet18
  simple_cnn:
    channels: [64, 128, 256]
    dropout: 0.25

train:
  max_epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0005
  optimizer: adamw
  scheduler: cosine

logging:
  save_dir: ./logs
  name: cifar
  version: null
  log_every_n_steps: 20

checkpoint:
  dirpath: ./checkpoints
  monitor: val_acc
  mode: max
  save_top_k: 1

runtime:
  accelerator: auto
  devices: auto
  precision: 32-true
  deterministic: true

